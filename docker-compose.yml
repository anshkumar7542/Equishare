services:
  postgres:
    image: postgres:16-alpine
    container_name: equishare-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: equishare
    ports:
      - "5432:5432"
    volumes:
      - equishare-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d equishare"]
      interval: 5s
      timeout: 5s
      retries: 12

volumes:
  equishare-postgres-data:
